<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #131722; overflow: hidden; }
  #chart-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
  #main-chart { flex: 1; }
  .sub-pane { height: 120px; border-top: 1px solid #2a2e39; }
</style>
</head>
<body>
<div id="chart-container">
  <div id="main-chart"></div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
const CHART_BG = '#131722';
const TEXT_COLOR = '#D1D4DC';
const GRID_COLOR = '#2a2e39';

let mainChart = null;
let candleSeries = null;
let subPaneCharts = {};
let indicatorSeries = {};

function createMainChart() {
  const container = document.getElementById('main-chart');
  mainChart = LightweightCharts.createChart(container, {
    layout: { background: { color: CHART_BG }, textColor: TEXT_COLOR },
    grid: { vertLines: { color: GRID_COLOR }, horzLines: { color: GRID_COLOR } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: GRID_COLOR },
    timeScale: { borderColor: GRID_COLOR, timeVisible: true, secondsVisible: false },
    width: container.clientWidth,
    height: container.clientHeight,
  });
  candleSeries = mainChart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    wickUpColor: '#26a69a', wickDownColor: '#ef5350',
  });
}

function initChart(payload) {
  const data = typeof payload === 'string' ? JSON.parse(payload) : payload;

  // Clear existing sub-panes
  document.querySelectorAll('.sub-pane').forEach(el => el.remove());
  subPaneCharts = {};
  indicatorSeries = {};

  if (!mainChart) createMainChart();

  const klineData = data.klines.map(k => ({
    time: Math.floor(k.time / 1000),
    open: k.open, high: k.high, low: k.low, close: k.close,
  }));
  candleSeries.setData(klineData);

  // Render indicators
  if (data.indicators) {
    data.indicators.forEach(ind => setIndicator(ind));
  }
}

function updateCandle(kline) {
  const k = typeof kline === 'string' ? JSON.parse(kline) : kline;
  if (!candleSeries) return;
  candleSeries.update({
    time: Math.floor(k.time / 1000),
    open: k.open, high: k.high, low: k.low, close: k.close,
  });
}

function setIndicator(indicator) {
  const ind = typeof indicator === 'string' ? JSON.parse(indicator) : indicator;
  const isSubPane = ind.pane === 'SUB_PANE';

  if (isSubPane) {
    let paneChart = subPaneCharts[ind.type];
    if (!paneChart) {
      const container = document.createElement('div');
      container.className = 'sub-pane';
      container.id = 'pane-' + ind.type;
      document.getElementById('chart-container').appendChild(container);
      paneChart = LightweightCharts.createChart(container, {
        layout: { background: { color: CHART_BG }, textColor: TEXT_COLOR },
        grid: { vertLines: { color: GRID_COLOR }, horzLines: { color: GRID_COLOR } },
        rightPriceScale: { borderColor: GRID_COLOR },
        timeScale: { visible: false },
        width: container.clientWidth,
        height: 120,
      });
      subPaneCharts[ind.type] = paneChart;
      // Sync time scale with main chart
      mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) paneChart.timeScale().setVisibleLogicalRange(range);
      });
    }

    ind.series.forEach(s => {
      const key = ind.type + '_' + s.name;
      if (!indicatorSeries[key]) {
        indicatorSeries[key] = ind.type === 'VOLUME'
          ? paneChart.addHistogramSeries({ color: '#26a69a88', priceFormat: { type: 'volume' } })
          : paneChart.addLineSeries({ color: seriesColor(s.name), lineWidth: 1 });
      }
      const seriesData = buildSeriesData(s.values);
      indicatorSeries[key].setData(seriesData);
    });
  } else {
    // Overlay on main chart
    ind.series.forEach(s => {
      const key = ind.type + '_' + s.name;
      if (!indicatorSeries[key]) {
        indicatorSeries[key] = mainChart.addLineSeries({ color: seriesColor(s.name), lineWidth: 1 });
      }
      indicatorSeries[key].setData(buildSeriesData(s.values));
    });
  }
}

function setInterval(interval) {
  // Kotlin will call initChart again after fetching new klines for the interval
}

function addDrawing(drawing) {
  const d = typeof drawing === 'string' ? JSON.parse(drawing) : drawing;
  if (!mainChart || !candleSeries) return;

  if (d.type === 'HORIZONTAL_LINE' && d.points.length > 0) {
    candleSeries.createPriceLine({
      price: d.points[0].price,
      color: '#f59e0b',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title: d.id,
    });
  }
}

function removeDrawing(id) {
  // Price line removal handled via series reference tracking (extend as needed)
}

// Helpers
function buildSeriesData(values) {
  // values align 1:1 with kline data; we need the time axis from candleSeries
  const klines = candleSeries ? [] : [];
  return values
    .map((v, i) => v !== null && v !== undefined ? { time: getKlineTime(i), value: v } : null)
    .filter(Boolean);
}

let _klinesRef = [];
function initChart(payload) {
  const data = typeof payload === 'string' ? JSON.parse(payload) : payload;
  document.querySelectorAll('.sub-pane').forEach(el => el.remove());
  subPaneCharts = {};
  indicatorSeries = {};
  if (!mainChart) createMainChart();
  _klinesRef = data.klines;
  const klineData = data.klines.map(k => ({
    time: Math.floor(k.time / 1000), open: k.open, high: k.high, low: k.low, close: k.close,
  }));
  candleSeries.setData(klineData);
  if (data.indicators) data.indicators.forEach(ind => setIndicator(ind));
}

function getKlineTime(index) {
  return _klinesRef[index] ? Math.floor(_klinesRef[index].time / 1000) : index;
}

function seriesColor(name) {
  const colors = { 'SMA(20)': '#f59e0b', 'EMA(20)': '#a78bfa', RSI: '#f59e0b', MACD: '#3b82f6', Signal: '#ef4444', Histogram: '#22c55e', BB_UPPER: '#64748b', BB_LOWER: '#64748b', BB_MIDDLE: '#94a3b8' };
  return colors[name] || '#D1D4DC';
}

// Handle resize
window.addEventListener('resize', () => {
  if (mainChart) mainChart.applyOptions({ width: window.innerWidth });
  Object.values(subPaneCharts).forEach(c => c.applyOptions({ width: window.innerWidth }));
});

createMainChart();
</script>
</body>
</html>
